<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="dashboard-page">

<!-- NAVBAR -->
<nav>
  <h2>Admin Panel</h2>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<h1 class="page-title">Dashboard</h1>

<!-- MAIN CONTAINER -->
<div class="dashboard-container">

  <!-- ADD PROJECT -->
  <div class="dash-card">
    <h2>Add Project</h2>

    <form id="projectForm">

      <input type="text" id="title" placeholder="Project Title" required>

      <input type="text" id="description" placeholder="Short Description" required>

      <input type="text" id="github" placeholder="GitHub Link">

      <input type="text" id="image" placeholder="Image URL (optional)">

      <button type="submit">Add Project</button>

    </form>
  </div>

  <!-- ADD SKILL -->
  <div class="dash-card">
    <h2>Add Skill</h2>

    <form id="skillForm">

      <input type="text" id="skillName" placeholder="Skill Name (e.g. Python)" required>

      <input type="number" id="skillLevel" placeholder="Skill Level (0-100%)" required>

      <button type="submit">Add Skill</button>

    </form>
  </div>

</div>

<!-- MESSAGES -->
<div class="messages-section">

  <div class="messages-container">

    <h2>Visitor Messages</h2>

    <div id="messages" class="message-box"></div>

  </div>

</div>
<script src="js/script.js"></script>

</body>
</html>
