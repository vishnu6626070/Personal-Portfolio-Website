<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vishnu Portfolio | Admin Login</title>
  <!-- Google Fonts & FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <!-- Interactive Starfield Canvas Background -->
  <canvas id="starfield-canvas"></canvas>

  <!-- NAVBAR -->
  <nav>
    <h2>Vishnu Portfolio</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="education.html">Education</a></li>
      <li><a href="certifications.html">Certifications</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li class="active"><a href="login.html" class="admin-nav-btn">Admin</a></li>
    </ul>
  </nav>

  <!-- LOGIN SECTION -->
  <section class="login-container">
    <div class="login-glass-box">
      <h2 class="login-title">Admin Portal</h2>
      <p>Log in to update your portfolio settings, projects, skills, education, and check messages.</p>
      
      <form id="loginForm" class="login-form">
        <div class="form-group" style="text-align: left;">
          <label for="email">Admin Email</label>
          <input type="email" id="email" placeholder="admin@example.com" required>
        </div>
        
        <div class="form-group" style="text-align: left; position: relative;">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" minlength="6" required style="padding-right: 40px;">
          <i class="fas fa-eye-slash" id="toggleLoginPassword" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: var(--text-secondary); transition: var(--transition-smooth);"></i>
        </div>
        
        <button type="submit">Login <i class="fas fa-sign-in-alt" style="margin-left: 8px;"></i></button>
      </form>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
